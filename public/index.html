<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="UIDAI Attendance Dashboard — Employee and HR Login Portal">
  <title>Login — UIDAI RO LucknowAttendance Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="logo">
        <div class="logo-icon-lg">🏛️</div>
        <h2>UIDAI RO Lucknow Attendance</h2>
        <p>Sign in to your dashboard</p>
      </div>

      <div class="toast-container" id="toastContainer"></div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="employeeId">Employee / Officer ID</label>
          <input
            type="text"
            id="employeeId"
            class="form-control"
            placeholder="e.g. EMP001"
            required
            autofocus
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="Enter your password"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        New employee? <a href="/register.html">Create an account</a>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
