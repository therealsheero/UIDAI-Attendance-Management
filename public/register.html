<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Register as a new employee on the UIDAI Attendance Dashboard">
  <title>Register — UIDAI Attendance Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="logo">
        <div class="logo-icon-lg">📝</div>
        <h2>Employee Registration</h2>
        <p>Create your attendance account</p>
      </div>
      <div class="toast-container" id="toastContainer"></div>

      <form id="registerForm" autocomplete="off">
        <div class="form-group">
          <label for="employeeId">Employee ID</label>
          <input
            type="text"
            id="employeeId"
            class="form-control"
            placeholder="e.g. EMP001"
            required
            autofocus
          >
        </div>

        <div class="form-group">
          <label for="name">Full Name</label>
          <input
            type="text"
            id="name"
            class="form-control"
            placeholder="Enter your full name"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="Min 4 characters"
            required
            minlength="4"
          >
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            class="form-control"
            placeholder="Repeat your password"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="registerBtn">
          Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already registered? <a href="/index.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
